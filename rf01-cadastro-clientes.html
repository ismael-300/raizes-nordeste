<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Cadastro e Autenticação de Clientes</title>

<style>

body{
    font-family:Arial;
    background:#f2f4f8;
    margin:30px;
}

.container{
    width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#003366;
}

label{
    display:block;
    margin-top:12px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
}

button{

    padding:10px 18px;
    margin-top:15px;
    margin-right:8px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    color:white;
    background:#003366;

}

button:hover{

background:#0055aa;

}

table{

width:100%;
margin-top:25px;
border-collapse:collapse;

}

table,th,td{

border:1px solid #ccc;

}

th{

background:#003366;
color:white;

}

th,td{

padding:10px;
text-align:center;

}

.success{

color:green;
font-weight:bold;

}

.error{

color:red;
font-weight:bold;

}

.social{

background:#4CAF50;

}

.info{

margin-top:20px;
background:#eef7ff;
padding:15px;
border-left:5px solid #003366;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Cadastro de Clientes</h1>

<label>Nome</label>
<input type="text" id="nome">

<label>E-mail</label>
<input type="email" id="email">

<label>Senha</label>
<input type="password" id="senha">

<button onclick="cadastrar()">
Cadastrar
</button>

<br>

<button class="social" onclick="loginGoogle()">
Entrar com Google
</button>

<button class="social" onclick="loginFacebook()">
Entrar com Facebook
</button>

<button class="social" onclick="loginTelefone()">
Entrar com Telefone
</button>

<p id="mensagem"></p>

<table>

<thead>

<tr>

<th>Nome</th>

<th>E-mail</th>

</tr>

</thead>

<tbody id="clientes">

</tbody>

</table>

<div class="info">

<b>Casos de Teste Simulados</b>

<ul>

<li>Cadastro com e-mail válido.</li>

<li>E-mail já existente.</li>

<li>Formato de e-mail inválido.</li>

</ul>

</div>

</div>

</div>

<script>

let usuarios=[

{

nome:"Administrador",
email:"admin@email.com"

}

];

atualizarTabela();

function atualizarTabela(){

let tabela=document.getElementById("clientes");

tabela.innerHTML="";

usuarios.forEach(u=>{

tabela.innerHTML+=`

<tr>

<td>${u.nome}</td>

<td>${u.email}</td>

</tr>

`;

});

}

function cadastrar(){

let nome=document.getElementById("nome").value.trim();
let email=document.getElementById("email").value.trim();
let senha=document.getElementById("senha").value;

let regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!regex.test(email)){

document.getElementById("mensagem").innerHTML=
"<span class='error'> E-mail inválido.</span>";

return;

}

let existe=usuarios.find(u=>u.email.toLowerCase()==email.toLowerCase());

if(existe){

document.getElementById("mensagem").innerHTML=
"<span class='error'> E-mail já cadastrado.</span>";

return;

}

usuarios.push({

nome:nome,
email:email

});

atualizarTabela();

document.getElementById("mensagem").innerHTML=
"<span class='success'> Cadastro realizado com sucesso.</span>";

document.getElementById("nome").value="";
document.getElementById("email").value="";
document.getElementById("senha").value="";

}

function loginGoogle(){

alert("Simulação: autenticação realizada via Google.");

}

function loginFacebook(){

alert("Simulação: autenticação realizada via Facebook.");

}

function loginTelefone(){

alert("Simulação: autenticação realizada via Telefone.");

}

</script>

</body>

</html>
