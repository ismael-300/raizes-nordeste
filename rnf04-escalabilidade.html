<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RNF04 - Escalabilidade</title>

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:30px;
}

.container{
    max-width:950px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
    margin-bottom:25px;
}

h1{
    color:#003366;
    text-align:center;
}

h2{
    color:#003366;
}

label{
    display:block;
    margin-top:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
}

button{
    margin-top:15px;
    background:#003366;
    color:white;
    border:none;
    padding:10px 18px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0055aa;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid #ccc;
}

th{
    background:#003366;
    color:white;
}

th,td{
    padding:10px;
    text-align:center;
}

.success{
    color:green;
    font-weight:bold;
}

.info{
    background:#eef7ff;
    border-left:5px solid #003366;
    padding:12px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>RNF04 - Escalabilidade</h1>

<div class="card">

<h2>Cadastro de Nova Franquia</h2>

<label>Nome da Franquia</label>
<input type="text" id="nome">

<label>Cidade</label>
<input type="text" id="cidade">

<label>Estado</label>
<input type="text" id="estado">

<label>Status</label>

<select id="status">
<option>Em Operação</option>
<option>Em Implantação</option>
</select>

<button onclick="cadastrarFranquia()">
Cadastrar Franquia
</button>

<p id="mensagem"></p>

</div>

<div class="card">

<h2>Franquias Disponíveis</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Franquia</th>

<th>Cidade</th>

<th>Estado</th>

<th>Status</th>

</tr>

</thead>

<tbody id="lista">

</tbody>

</table>

<div class="info">

<strong>Simulação do Cenário</strong>

<p>
O sistema permite a inclusão da nova franquia e sua operação normal utilizando apenas configurações e cadastros administrativos.
</p>

</div>

</div>

</div>

<script>

let franquias=[

{id:1,nome:"Franquia Centro",cidade:"São Paulo",estado:"SP",status:"Em Operação"},
{id:2,nome:"Franquia Norte",cidade:"Curitiba",estado:"PR",status:"Em Operação"}

];

function atualizarTabela(){

let tabela=document.getElementById("lista");

tabela.innerHTML="";

franquias.forEach(f=>{

tabela.innerHTML+=`

<tr>

<td>${f.id}</td>

<td>${f.nome}</td>

<td>${f.cidade}</td>

<td>${f.estado}</td>

<td>${f.status}</td>

</tr>

`;

});

}

atualizarTabela();

function cadastrarFranquia(){

let nome=document.getElementById("nome").value;
let cidade=document.getElementById("cidade").value;
let estado=document.getElementById("estado").value;
let status=document.getElementById("status").value;

if(nome=="" || cidade=="" || estado==""){

document.getElementById("mensagem").innerHTML=
"<span style='color:red;font-weight:bold;'>Preencha todos os campos.</span>";

return;

}

franquias.push({

id:franquias.length+1,
nome:nome,
cidade:cidade,
estado:estado,
status:status

});

atualizarTabela();

document.getElementById("mensagem").innerHTML=
"<span class='success'>Nova franquia cadastrada com sucesso!</span><br><br>" +
"<strong>Resultado do teste:</strong><br>" +
"✔ Unidade adicionada ao sistema apenas por configuração administrativa.<br>" +
"✔ Nenhuma alteração estrutural foi necessária.<br>" +
"✔ A nova franquia já está disponível para operação.";

document.getElementById("nome").value="";
document.getElementById("cidade").value="";
document.getElementById("estado").value="";

}

</script>

</body>
</html>
