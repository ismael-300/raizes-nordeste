<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>RNF06 - Confiabilidade</title>

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:25px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,.15);
}

h1{
    color:#003366;
    text-align:center;
}

h2{
    color:#003366;
}

label{
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
}

button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    background:#003366;
    color:white;
    cursor:pointer;
    border-radius:4px;
}

button:hover{
    background:#0055aa;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid #ccc;
}

th{
    background:#003366;
    color:white;
}

th,td{
    padding:10px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Simulação RNF06 - Confiabilidade</h1>

<div class="card">

<h2>Cadastro de Pedido</h2>

<label>Cliente</label>
<input id="cliente" type="text">

<label>Valor do Pedido (R$)</label>
<input id="valor" type="number">

<button onclick="registrarPedido()">
Criar Pedido
</button>

<button onclick="simularFalha()">
Cancelar Pedido
</button>

<p id="mensagem"></p>

</div>

<div class="card">

<h2>Pedidos Registrados</h2>

<table>

<tr>
<th>Cliente</th>
<th>Valor</th>
<th>Pontos</th>
</tr>

<tbody id="tabelaPedidos">

</tbody>

</table>

</div>

</div>

<script>

let pedidos=[];

function registrarPedido(){

let cliente=document.getElementById("cliente").value;
let valor=parseFloat(document.getElementById("valor").value);

if(cliente=="" || isNaN(valor)){

document.getElementById("mensagem").innerHTML=
"<span class='error'>Preencha todos os campos.</span>";

return;

}

// Início da transação

let pontos=Math.floor(valor/10);

let pedido={
cliente:cliente,
valor:valor,
pontos:pontos
};

// Commit

pedidos.push(pedido);

atualizarTabela();

document.getElementById("mensagem").innerHTML=
"<span class='success'>Pedido registrado com sucesso.<br>Pontos gerados: "+pontos+"<br>Transação concluída com integridade.</span>";

}

function simularFalha(){

let cliente=document.getElementById("cliente").value;
let valor=parseFloat(document.getElementById("valor").value);

if(cliente=="" || isNaN(valor)){

document.getElementById("mensagem").innerHTML=
"<span class='error'>Preencha todos os campos.</span>";

return;

}

// Início da transação

let pontos=Math.floor(valor/10);

// Falha proposital

let erro=true;

if(erro){

// Rollback

document.getElementById("mensagem").innerHTML=
"<span class='error'>Falha detectada durante a transação.<br>Rollback executado.<br>Nenhum pedido foi registrado e nenhum ponto foi concedido.</span>";

return;

}

}

function atualizarTabela(){

let tabela=document.getElementById("tabelaPedidos");

tabela.innerHTML="";

pedidos.forEach(function(item){

tabela.innerHTML+=`

<tr>

<td>${item.cliente}</td>

<td>R$ ${item.valor.toFixed(2)}</td>

<td>${item.pontos}</td>

</tr>

`;

});

}

</script>

</body>

</html>
