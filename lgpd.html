<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Simulação LGPD - Casos de Teste RNF07</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#003366;
}

h2{
    color:#003366;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    padding:10px 18px;
    background:#003366;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:4px;
}

button:hover{
    background:#0055aa;
}

.success{
    color:green;
    font-weight:bold;
}

.warning{
    color:red;
    font-weight:bold;
}

pre{
    background:#efefef;
    padding:15px;
}
</style>

</head>

<body>

<div class="container">

<h1>LGPD</h1>

<!-- CT01 -->

<div class="card">

<h2>Cadastro de Usuário - Consentimento LGPD</h2>

<label>Nome</label>
<input type="text" id="nome">

<label>E-mail</label>
<input type="email" id="email">

<label>CPF</label>
<input type="text" id="cpf">

<label>
<input type="checkbox" id="consentimento">
Li e aceito o Termo de Consentimento para coleta e tratamento dos meus dados pessoais conforme a LGPD.
</label>

<br><br>

<button onclick="cadastrar()">Cadastrar</button>

<p id="cadastro"></p>

</div>

<!-- CT02 -->

<div class="card">

<h2>CT-RNF07-02 - Consulta dos Dados Pessoais</h2>

<button onclick="consultar()">Consultar Dados</button>

<pre id="dados">
Nenhum dado disponível.
</pre>

</div>

<!-- CT03 -->

<div class="card">

<h2>CT-RNF07-03 - Exclusão dos Dados</h2>

<button onclick="excluir()">Solicitar Exclusão dos Dados</button>

<p id="exclusao"></p>

</div>

</div>

<script>

let cliente = null;

function cadastrar(){

let nome = document.getElementById("nome").value;
let email = document.getElementById("email").value;
let cpf = document.getElementById("cpf").value;
let consentimento = document.getElementById("consentimento").checked;

if(!consentimento){

document.getElementById("cadastro").innerHTML =
"<span class='warning'>Cadastro bloqueado. O consentimento LGPD é obrigatório.</span>";

return;

}

cliente = {

nome,
email,
cpf,
consentimento,
dataConsentimento:new Date().toLocaleString()

};

document.getElementById("cadastro").innerHTML =
"<span class='success'>Consentimento registrado com sucesso.<br>Cadastro realizado.</span>";

}

function consultar(){

if(cliente==null){

document.getElementById("dados").innerText =
"Nenhum cliente cadastrado.";

return;

}

document.getElementById("dados").innerText =
JSON.stringify(cliente,null,4);

}

function excluir(){

if(cliente==null){

document.getElementById("exclusao").innerHTML =
"<span class='warning'>Não existem dados cadastrados.</span>";

return;

}

cliente.nome="ANONIMIZADO";
cliente.email="anonimizado@lgpd";
cliente.cpf="***.***.***-**";

document.getElementById("exclusao").innerHTML=
"<span class='success'>Dados anonimizados conforme solicitação do titular.<br>Operação registrada com sucesso.</span>";

}

</script>

</body>
</html>
